<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상호작용형 학생 추첨 시스템</title>
    <!-- Tailwind CSS 지원 및 아이콘 라이브러리 연동 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background: radial-gradient(circle at center, #1e1e38 0%, #0c0c1e 100%);
            color: #ffffff;
        }
        /* 카드 3D 회전을 위한 스타일 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-x-hidden">

    <!-- 메인 컨테이너 -->
    <div class="w-full max-w-4xl glass-panel rounded-3xl shadow-2xl p-6 md:p-8 relative">
        
        <!-- 커스텀 알림 모달 -->
        <div id="custom-alert" class="hidden fixed inset-0 flex items-center justify-center z-50 px-4">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
            <div class="bg-slate-800 border border-red-500/30 rounded-2xl p-6 max-w-sm w-full relative z-10 text-center shadow-2xl transform scale-95 transition-transform duration-200">
                <div class="w-16 h-16 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <h3 class="text-lg font-bold mb-2">오류가 발생했습니다</h3>
                <p id="alert-message" class="text-slate-300 text-sm mb-6"></p>
                <button onclick="closeAlert()" class="w-full py-2.5 bg-red-500 hover:bg-red-600 active:scale-95 transition text-white font-semibold rounded-xl">확인</button>
            </div>
        </div>

        <!-- 1. 설정 및 입력 화면 -->
        <div id="setup-screen" class="space-y-6">
            <div class="text-center">
                <span class="px-3 py-1 bg-indigo-500/10 text-indigo-300 rounded-full text-xs font-semibold tracking-wider uppercase">LUCKY DRAW</span>
                <h1 class="text-3xl md:text-4xl font-extrabold mt-2 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300">
                    학생 추첨 시뮬레이터
                </h1>
                <p class="text-slate-400 text-sm mt-1">확률과 횟수를 지정하여 공정한 추첨을 시작하세요.</p>
            </div>

            <!-- 설정 카드 레이아웃 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4">
                
                <!-- 확률 입력 카드 -->
                <div class="bg-white/5 border border-white/10 rounded-2xl p-5 space-y-4">
                    <h2 class="text-lg font-bold flex items-center gap-2 text-indigo-300">
                        <i class="fa-solid fa-percentage"></i> 확률 방식 선택
                    </h2>
                    
                    <!-- 토글 탭 -->
                    <div class="flex bg-black/30 p-1 rounded-xl">
                        <button onclick="setProbType('fraction')" id="btn-fraction" class="flex-1 py-2 rounded-lg text-sm font-semibold transition active:scale-95 bg-indigo-600 text-white shadow-md">
                            분수 입력
                        </button>
                        <button onclick="setProbType('percent')" id="btn-percent" class="flex-1 py-2 rounded-lg text-sm font-semibold transition active:scale-95 text-slate-400 hover:text-white">
                            퍼센트(%) 입력
                        </button>
                    </div>

                    <!-- 분수 입력 영역 -->
                    <div id="fraction-area" class="space-y-2">
                        <label class="block text-xs text-slate-400">당첨 확률 (분수 형태)</label>
                        <div class="flex items-center justify-center gap-3 bg-black/20 p-3 rounded-xl border border-white/5">
                            <input type="number" id="prob-num" value="1" min="1" class="w-20 bg-slate-800 text-center py-2 text-lg font-bold rounded-lg border border-slate-700 focus:outline-none focus:border-indigo-500 transition text-emerald-400">
                            <span class="text-xl font-bold text-slate-500">/</span>
                            <input type="number" id="prob-den" value="5" min="1" class="w-20 bg-slate-800 text-center py-2 text-lg font-bold rounded-lg border border-slate-700 focus:outline-none focus:border-indigo-500 transition text-indigo-400">
                        </div>
                        <p class="text-[11px] text-slate-400 text-center" id="fraction-preview">현재 확률: 20% (5번 중 1번 당첨)</p>
                    </div>

                    <!-- 퍼센트 입력 영역 -->
                    <div id="percent-area" class="space-y-2 hidden">
                        <label class="block text-xs text-slate-400">당첨 확률 (퍼센트 수치)</label>
                        <div class="flex items-center justify-center gap-2 bg-black/20 p-3 rounded-xl border border-white/5">
                            <input type="number" id="prob-percent" value="20" min="0" max="100" step="any" class="w-28 bg-slate-800 text-center py-2 text-lg font-bold rounded-lg border border-slate-700 focus:outline-none focus:border-indigo-500 transition text-emerald-400">
                            <span class="text-xl font-bold text-slate-400">%</span>
                        </div>
                        <p class="text-[11px] text-slate-400 text-center">0%에서 100% 사이로 자유롭게 설정 가능합니다.</p>
                    </div>
                </div>

                <!-- 추첨 횟수 입력 카드 -->
                <div class="bg-white/5 border border-white/10 rounded-2xl p-5 flex flex-col justify-between">
                    <div class="space-y-4">
                        <h2 class="text-lg font-bold flex items-center gap-2 text-indigo-300">
                            <i class="fa-solid fa-ticket"></i> 추첨 횟수 설정
                        </h2>
                        
                        <div class="space-y-2">
                            <label class="block text-xs text-slate-400">총 뽑아낼 카드 갯수 (최대 40회)</label>
                            <div class="flex items-center justify-between bg-black/20 p-3 rounded-xl border border-white/5">
                                <button onclick="adjustDrawCount(-1)" class="w-10 h-10 bg-slate-800 hover:bg-slate-700 active:scale-90 transition rounded-lg text-lg font-bold flex items-center justify-center">
                                    <i class="fa-solid fa-minus"></i>
                                </button>
                                <input type="number" id="draw-count" value="5" min="1" max="40" class="w-20 bg-transparent text-center text-2xl font-black focus:outline-none text-white">
                                <button onclick="adjustDrawCount(1)" class="w-10 h-10 bg-slate-800 hover:bg-slate-700 active:scale-90 transition rounded-lg text-lg font-bold flex items-center justify-center">
                                    <i class="fa-solid fa-plus"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <button onclick="startDraw()" class="w-full mt-6 py-4 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 active:scale-[0.98] transition-all duration-150 rounded-xl font-extrabold text-lg shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-play"></i> 추첨 시작하기
                    </button>
                </div>
            </div>
        </div>

        <!-- 2. 추첨 결과 & 애니메이션 Canvas 화면 -->
        <div id="draw-screen" class="hidden space-y-6">
            <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4 border-b border-white/10 pb-4">
                <div class="space-y-1">
                    <div class="flex flex-wrap items-center gap-2.5">
                        <h2 class="text-xl md:text-2xl font-extrabold text-indigo-300 flex items-center gap-2">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> 실시간 추첨 현황
                        </h2>
                        <!-- 설정된 확률 표시 배지 -->
                        <span id="current-probability-badge" class="px-2.5 py-0.5 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-lg text-xs font-bold tracking-wide">
                            설정 확률: -
                        </span>
                    </div>
                    <p class="text-xs text-slate-400" id="draw-status-text">추첨 준비 중...</p>
                </div>
                <!-- 돌아가기 버튼 (처음엔 비활성화 혹은 끝난 후 활성화) -->
                <button id="btn-back" onclick="goBack()" class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all text-white font-bold rounded-xl text-sm flex items-center gap-2 opacity-50 cursor-not-allowed" disabled>
                    <i class="fa-solid fa-rotate-left"></i> 다시 설정하기 (설정 유지)
                </button>
            </div>

            <!-- Canvas 컨테이너 -->
            <div class="relative w-full aspect-[4/3] max-h-[500px] bg-slate-950/80 rounded-2xl overflow-hidden border border-slate-800 shadow-inner">
                <canvas id="canvas" class="w-full h-full block"></canvas>
            </div>
        </div>
    </div>

    <!-- 스크립트 파트 -->
    <script>
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // 상태 변수들
        let probType = 'fraction'; // 'fraction' | 'percent'
        let probability = 0.2; // 계산된 확률 (0 ~ 1)
        let totalDraws = 5;
        let results = []; // 각 회차의 결과 ('WIN' | 'LOSE')
        
        // Canvas 관련
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let animationId;
        
        // 물리 시뮬레이션용 공들 & 파티클들
        let balls = [];
        let particles = [];
        let cards = [];
        
        // 단계 정의
        // 'SHUFFLING': 1~2초간 섞임 -> 'REVEALING': 0.3초당 카드 한 장씩 공개 -> 'FINISHED': 완료
        let animState = 'SHUFFLING'; 
        let shuffleTimer = 0; // 프레임 단위 누적
        const shuffleDuration = 90; // 1.5초 (60fps 기준)
        
        let revealTimer = 0;
        const revealInterval = 18; // 0.3초 (60fps 기준)
        let currentRevealIndex = -1; // 현재 오픈 중인 카드 인덱스

        // 커스텀 알림창 핸들러
        function showAlert(msg) {
            document.getElementById('alert-message').innerText = msg;
            const modal = document.getElementById('custom-alert');
            modal.classList.remove('hidden');
        }
        function closeAlert() {
            document.getElementById('custom-alert').classList.add('hidden');
        }

        // 확률 모드 변경
        function setProbType(type) {
            probType = type;
            const btnFraction = document.getElementById('btn-fraction');
            const btnPercent = document.getElementById('btn-percent');
            const fractionArea = document.getElementById('fraction-area');
            const percentArea = document.getElementById('percent-area');

            if (type === 'fraction') {
                btnFraction.className = "flex-1 py-2 rounded-lg text-sm font-semibold transition active:scale-95 bg-indigo-600 text-white shadow-md";
                btnPercent.className = "flex-1 py-2 rounded-lg text-sm font-semibold transition active:scale-95 text-slate-400 hover:text-white";
                fractionArea.classList.remove('hidden');
                percentArea.classList.add('hidden');
            } else {
                btnFraction.className = "flex-1 py-2 rounded-lg text-sm font-semibold transition active:scale-95 text-slate-400 hover:text-white";
                btnPercent.className = "flex-1 py-2 rounded-lg text-sm font-semibold transition active:scale-95 bg-indigo-600 text-white shadow-md";
                fractionArea.classList.add('hidden');
                percentArea.classList.remove('hidden');
            }
        }

        // 실시간 분수 미리보기
        document.getElementById('prob-num').addEventListener('input', updateFractionPreview);
        document.getElementById('prob-den').addEventListener('input', updateFractionPreview);

        // 분수 포맷 상태 반영 헬퍼
        function getFractionText(num, den) {
            const pct = Math.min(100, Math.max(0, (num / den) * 100)).toFixed(1);
            return `설정 확률: ${num}/${den} (${pct}%)`;
        }

        function updateFractionPreview() {
            const num = parseInt(document.getElementById('prob-num').value) || 0;
            const den = parseInt(document.getElementById('prob-den').value) || 1;
            const preview = document.getElementById('fraction-preview');
            if (den <= 0) {
                preview.innerText = "분모는 1 이상이어야 합니다.";
                return;
            }
            const pct = Math.min(100, Math.max(0, (num / den) * 100)).toFixed(1);
            preview.innerText = `현재 확률: ${pct}% (${den}번 중 ${num}번 당첨)`;
        }

        // 횟수 조절기
        function adjustDrawCount(val) {
            const input = document.getElementById('draw-count');
            let current = parseInt(input.value) || 1;
            current += val;
            if (current < 1) current = 1;
            if (current > 40) current = 40;
            input.value = current;
        }

        // --- 추첨 시작 ---
        function startDraw() {
            // 1. 데이터 검증 및 분석
            totalDraws = parseInt(document.getElementById('draw-count').value);
            if (isNaN(totalDraws) || totalDraws < 1 || totalDraws > 40) {
                showAlert('추첨 횟수는 1회부터 40회까지만 입력 가능합니다.');
                return;
            }

            let displayProbText = '';
            if (probType === 'fraction') {
                const num = parseInt(document.getElementById('prob-num').value);
                const den = parseInt(document.getElementById('prob-den').value);
                if (isNaN(num) || isNaN(den) || den <= 0 || num < 0) {
                    showAlert('올바른 분수 형태를 지정해 주세요 (예: 1 / 5)');
                    return;
                }
                if (num > den) {
                    showAlert('분자가 분모보다 클 수 없습니다. (100% 초과 불가)');
                    return;
                }
                probability = num / den;
                const pct = (probability * 100).toFixed(1);
                displayProbText = `설정 확률: ${num}/${den} (${pct}%)`;
            } else {
                const percent = parseFloat(document.getElementById('prob-percent').value);
                if (isNaN(percent) || percent < 0 || percent > 100) {
                    showAlert('퍼센트 값은 0%에서 100% 사이여야 합니다.');
                    return;
                }
                probability = percent / 100;
                displayProbText = `설정 확률: ${percent}%`;
            }

            // 실시간 상단 배지에 설정 확률 반영
            document.getElementById('current-probability-badge').innerText = displayProbText;

            // 2. 난수 독립 시행으로 미리 결과 연산
            results = [];
            for (let i = 0; i < totalDraws; i++) {
                results.push(Math.random() < probability ? 'WIN' : 'LOSE');
            }

            // 3. UI 화면 전환
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('draw-screen').classList.remove('hidden');

            // 돌아가기 버튼 초기화 비활성화
            const btnBack = document.getElementById('btn-back');
            btnBack.disabled = true;
            btnBack.className = "px-5 py-2.5 bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all text-white font-bold rounded-xl text-sm flex items-center gap-2 opacity-50 cursor-not-allowed";

            // 4. 시뮬레이터 시스템 초기화
            initSimulator();
        }

        // 돌아가기 기능 (세팅 유지)
        function goBack() {
            cancelAnimationFrame(animationId);
            document.getElementById('draw-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
        }

        // --- 물리 시뮬레이션 및 그래픽스 핵심 엔진 ---
        
        // 고해상도 DPI 대응을 고려한 캔버스 리사이즈
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            // 가상 논리적 설계 해상도 800 x 600을 기준으로 그림
            canvas.width = 800;
            canvas.height = 600;
        }

        class Ball {
            constructor(x, y, isWin) {
                this.x = x;
                this.y = y;
                this.isWin = isWin;
                this.radius = 16;
                // 사방으로 튀는 기초 속도 부여
                this.vx = (Math.random() - 0.5) * 14;
                this.vy = (Math.random() - 0.5) * 14;
                this.color = isWin ? '#fbbf24' : '#64748b'; // Gold / Dark Slate
                this.glow = isWin ? 'rgba(251, 191, 36, 0.4)' : 'rgba(100, 116, 139, 0.1)';
            }

            update(cx, cy, r) {
                // 바닥 송풍 장치 시뮬레이션 (아래에서 위로 밀어내는 바람 가속도)
                this.vy -= 0.18; 
                this.vx += (Math.random() - 0.5) * 0.4; // 수평 난기류

                this.x += this.vx;
                this.y += this.vy;

                // 마찰 계수
                this.vx *= 0.99;
                this.vy *= 0.99;

                // 원형 추첨 챔버 경계 검출 및 탄성 충돌
                const dx = this.x - cx;
                const dy = this.y - cy;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > r - this.radius) {
                    // 원의 법선 벡터 계산
                    const nx = dx / dist;
                    const ny = dy / dist;

                    // 공의 속도와 법선 벡터 내적 계산
                    const dot = this.vx * nx + this.vy * ny;

                    // 반사 속도 계산 (완전 탄성에 가깝게 0.85 복원 계수 부여)
                    this.vx = (this.vx - 2 * dot * nx) * 0.85;
                    this.vy = (this.vy - 2 * dot * ny) * 0.85;

                    // 충돌 위치 보정 (경계 밖으로 뚫고 나가지 못하게 바깥 벽 안으로 고정)
                    this.x = cx + nx * (r - this.radius);
                    this.y = cy + ny * (r - this.radius);
                }
            }

            draw() {
                ctx.save();
                ctx.shadowColor = this.glow;
                ctx.shadowBlur = 10;
                
                // 그라디언트로 빛나는 구체 표현
                const grad = ctx.createRadialGradient(this.x - 5, this.y - 5, 2, this.x, this.y, this.radius);
                if (this.isWin) {
                    grad.addColorStop(0, '#fef08a');
                    grad.addColorStop(1, '#d97706');
                } else {
                    grad.addColorStop(0, '#94a3b8');
                    grad.addColorStop(1, '#334155');
                }
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // 텍스트 라벨링
                ctx.shadowBlur = 0;
                ctx.fillStyle = this.isWin ? '#451a03' : '#f8fafc';
                ctx.font = 'bold 10px Pretendard';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.isWin ? '당첨' : '꽝', this.x, this.y);
                ctx.restore();
            }
        }

        class Card {
            constructor(index, result, x, y, w, h) {
                this.index = index;
                this.result = result;
                this.targetX = x;
                this.targetY = y;
                this.x = x;
                // 초기에는 아래에서 위로 슬라이딩하며 올라오도록 오프셋 가미
                this.y = y + 100; 
                this.w = w;
                this.h = h;
                
                this.flipProgress = 0; // 0: 뒷면, 0.5: 측면, 1: 앞면
                this.isFlipped = false;
                this.opacity = 0;
            }

            update() {
                // 부드러운 목적지 보간 (Ease-out)
                this.y += (this.targetY - this.y) * 0.12;
                if (this.opacity < 1) this.opacity += 0.08;

                // 플립 회전 진척도 업데이트
                if (this.isFlipped && this.flipProgress < 1) {
                    this.flipProgress += 0.08;
                    if (this.flipProgress > 1) {
                        this.flipProgress = 1;
                        // 당첨 완료 시 파티클 축포 방출!
                        if (this.result === 'WIN') {
                            spawnParticles(this.x + this.w / 2, this.y + this.h / 2);
                        }
                    }
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = Math.min(1, Math.max(0, this.opacity));

                // 3D 회전 스케일링 효과를 모방한 렌더링 매트릭스 변환
                const scaleX = Math.abs(Math.sin((this.flipProgress + 0.5) * Math.PI));
                const midX = this.x + this.w / 2;

                ctx.translate(midX, this.y + this.h / 2);
                ctx.scale(scaleX, 1.0); // 가로 축만 수축하여 회전 표현
                ctx.translate(-midX, -(this.y + this.h / 2));

                // 0.5(수직 상태)를 기준으로 앞면 혹은 뒷면 결정
                const showFront = this.flipProgress >= 0.5;

                if (!showFront) {
                    // 뒷면 (미공개 상태)
                    const grad = ctx.createLinearGradient(this.x, this.y, this.x + this.w, this.y + this.h);
                    grad.addColorStop(0, '#312e81');
                    grad.addColorStop(1, '#1e1b4b');
                    ctx.fillStyle = grad;
                    ctx.strokeStyle = 'rgba(99, 102, 241, 0.5)';
                    ctx.lineWidth = 2;
                    
                    // 둥근 사각형 카드
                    drawRoundRect(this.x, this.y, this.w, this.h, 12);
                    ctx.fill();
                    ctx.stroke();

                    // 카드 번호 뱃지
                    ctx.fillStyle = 'rgba(255,255,255,0.1)';
                    ctx.beginPath();
                    ctx.arc(midX, this.y + this.h/2 - 10, 20, 0, Math.PI*2);
                    ctx.fill();

                    ctx.fillStyle = '#a5b4fc';
                    ctx.font = '800 16px Pretendard';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(`${this.index + 1}`, midX, this.y + this.h/2 - 10);

                    ctx.fillStyle = '#6366f1';
                    ctx.font = '600 11px Pretendard';
                    ctx.fillText('추첨중', midX, this.y + this.h/2 + 22);

                } else {
                    // 앞면 (결과 공개 상태)
                    const isWin = this.result === 'WIN';
                    const grad = ctx.createLinearGradient(this.x, this.y, this.x + this.w, this.y + this.h);
                    
                    if (isWin) {
                        grad.addColorStop(0, '#fef08a'); // Gold 밝은 면
                        grad.addColorStop(1, '#eab308'); // Gold 어두운 면
                        ctx.strokeStyle = '#facc15';
                    } else {
                        grad.addColorStop(0, '#475569'); // 어두운 회색 슬레이트
                        grad.addColorStop(1, '#334155');
                        ctx.strokeStyle = '#64748b';
                    }
                    
                    ctx.fillStyle = grad;
                    ctx.lineWidth = 3;
                    drawRoundRect(this.x, this.y, this.w, this.h, 12);
                    ctx.fill();
                    ctx.stroke();

                    // 텍스트 라벨 그리기
                    ctx.fillStyle = isWin ? '#713f12' : '#f8fafc';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    // 결과 등급 심볼
                    ctx.font = isWin ? '30px Pretendard' : '22px Pretendard';
                    ctx.fillText(isWin ? '🎉' : '💀', midX, this.y + this.h/2 - 18);

                    // 텍스트 결과값
                    ctx.font = '800 16px Pretendard';
                    ctx.fillText(isWin ? '당첨 !' : '꽝', midX, this.y + this.h/2 + 15);

                    // 하단 회차 표기
                    ctx.fillStyle = isWin ? '#a16207' : '#94a3b8';
                    ctx.font = 'bold 11px Pretendard';
                    ctx.fillText(`${this.index + 1}회차`, midX, this.y + this.h/2 + 36);
                }

                ctx.restore();
            }
        }

        // 축하 파티클 (꽃가루) 클래스
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 6 + 4;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 3; // 폭발 시 위쪽 벡터 가산
                this.gravity = 0.25;
                this.opacity = 1;
                this.color = `hsl(${Math.random() * 40 + 35}, 100%, 60%)`; // 금빛, 황금빛 그라데이션 색 분포
                this.rotation = Math.random() * Math.PI;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
                this.opacity -= 0.02;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.opacity);
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        // 둥근 사각형 그리기 헬퍼 유틸
        function drawRoundRect(x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        // 파티클 스폰 함수
        function spawnParticles(x, y) {
            for (let i = 0; i < 25; i++) {
                particles.push(new Particle(x, y));
            }
        }

        // --- 초기화 및 루프 실행 ---
        function initSimulator() {
            resizeCanvas();
            
            balls = [];
            particles = [];
            cards = [];
            shuffleTimer = 0;
            revealTimer = 0;
            currentRevealIndex = -1;
            animState = 'SHUFFLING';

            document.getElementById('draw-status-text').innerText = '추첨 챔버 활성화 - 마구 섞는 중...';

            // 챔버 내부에 랜덤한 볼들 생성 (확률 비중에 가깝게 꽝/당첨 공 비율 생성)
            const totalBalls = 30;
            const winBallCount = Math.round(totalBalls * probability);
            for (let i = 0; i < totalBalls; i++) {
                // 당첨공과 꽝공 비율 분배
                const isWin = i < winBallCount;
                // 추첨기 중앙 기준 (X: 400, Y: 180)의 반경 80 내에 랜덤 분포시킴
                const angle = Math.random() * Math.PI * 2;
                const r = Math.random() * 70;
                const bx = 400 + Math.cos(angle) * r;
                const by = 180 + Math.sin(angle) * r;
                balls.push(new Ball(bx, by, isWin));
            }

            // 회차별 카드 격자(그리드) 위치 자동 설계 연산
            calculateGrid();

            // 애니메이션 인터벌 구동 시작
            if (animationId) cancelAnimationFrame(animationId);
            animate();
        }

        // 개별 카드의 크기와 최적의 그리드 배치 자동 연산
        function calculateGrid() {
            const count = totalDraws;
            const startY = 360;  // 카드 영역 상단 시작점
            const endY = 570;    // 카드 영역 하단 한계점
            const areaWidth = 760; // 좌우 여백 제외 실 폭

            // 최적의 열(Cols)과 행(Rows) 계산
            let cols = 1;
            let rows = 1;
            let maxArea = 0;

            for (let r = 1; r <= 4; r++) {
                let c = Math.ceil(count / r);
                if (c > 12) continue; // 너무 좁은 세로 방지

                const tempW = (areaWidth - (c - 1) * 8) / c;
                const tempH = ((endY - startY) - (r - 1) * 8) / r;
                
                // 비율 왜곡 방지 및 최대 크기 조건 검출
                const size = Math.min(tempW, tempH * 0.9); 
                if (size > maxArea) {
                    maxArea = size;
                    cols = c;
                    rows = r;
                }
            }

            // 고정 비율로 크기 제한 설정
            let cardW = Math.min(90, (areaWidth - (cols - 1) * 8) / cols);
            let cardH = Math.min(110, cardW * 1.25);

            // 산출된 카드들의 최종 중심 정렬 계산
            const totalGridW = cols * cardW + (cols - 1) * 8;
            const totalGridH = rows * cardH + (rows - 1) * 8;
            const startX = 20 + (areaWidth - totalGridW) / 2;
            const originY = startY + ((endY - startY) - totalGridH) / 2;

            for (let i = 0; i < count; i++) {
                const rIndex = Math.floor(i / cols);
                const cIndex = i % cols;
                const cx = startX + cIndex * (cardW + 8);
                const cy = originY + rIndex * (cardH + 8);
                cards.push(new Card(i, results[i], cx, cy, cardW, cardH));
            }
        }

        // --- 메인 드로잉 애니메이션 루프 ---
        function animate() {
            // 배경 페인팅 (반투명 잔상 효과는 남기지 않고 청결하게 지움)
            ctx.fillStyle = '#090916';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. 송풍 추첨기 챔버 그리기 (상단 영역)
            drawChamber();

            // 2. 물리 구체(공) 상태 갱신 및 드로잉
            balls.forEach(ball => {
                if (animState === 'SHUFFLING') {
                    ball.update(400, 180, 110); // 원 내부에서 바운싱
                } else {
                    // 추첨 완료 단계에서는 중력으로 슬그머니 굴러 떨어짐 효과
                    ball.vy += 0.4;
                    ball.x += ball.vx;
                    ball.y += ball.vy;
                    // 바닥 충돌 처리
                    if (ball.y > 620) {
                        ball.y = 620;
                        ball.vy = 0;
                    }
                }
                ball.draw();
            });

            // 3. 결과 카드 업데이트 및 렌더링
            cards.forEach(card => {
                card.update();
                card.draw();
            });

            // 4. 축하 꽃가루 파티클 렌더링
            particles.forEach((p, idx) => {
                p.update();
                p.draw();
                if (p.opacity <= 0) particles.splice(idx, 1);
            });

            // 5. 프레임 상태 머신 전이 처리
            if (animState === 'SHUFFLING') {
                shuffleTimer++;
                if (shuffleTimer >= shuffleDuration) {
                    animState = 'REVEALING';
                    currentRevealIndex = 0;
                    document.getElementById('draw-status-text').innerText = '셔플링 완료! 순차 개봉을 시작합니다.';
                }
            } else if (animState === 'REVEALING') {
                revealTimer++;
                
                // 첫번째 카드가 즉각 뒤집어지도록 흐름 제어 및 간격 처리
                if (currentRevealIndex < cards.length) {
                    const currentCard = cards[currentRevealIndex];
                    if (!currentCard.isFlipped) {
                        currentCard.isFlipped = true;
                    }
                    
                    if (revealTimer >= revealInterval) {
                        revealTimer = 0;
                        currentRevealIndex++;
                    }
                } else {
                    // 모든 개봉 프로세스 종료
                    animState = 'FINISHED';
                    endDrawSequence();
                }
            }

            animationId = requestAnimationFrame(animate);
        }

        // 추첨기 챔버 그래픽 요소 빌드
        function drawChamber() {
            ctx.save();
            // 유리 챔버 외곽선 광원효과
            ctx.shadowColor = 'rgba(99, 102, 241, 0.4)';
            ctx.shadowBlur = 18;
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 4;
            ctx.fillStyle = 'rgba(15, 23, 42, 0.6)';
            
            ctx.beginPath();
            ctx.arc(400, 180, 110, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // 유리광택 디테일 곡선 묘사
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(400, 180, 100, Math.PI * 1.1, Math.PI * 1.5);
            ctx.stroke();

            // 추첨기 하단 스탠드 묘사
            ctx.fillStyle = '#1e1b4b';
            ctx.strokeStyle = '#4f46e5';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(340, 280);
            ctx.lineTo(310, 315);
            ctx.lineTo(490, 315);
            ctx.lineTo(460, 280);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 바람 구멍 디테일 팬
            ctx.fillStyle = '#312e81';
            ctx.beginPath();
            ctx.arc(400, 285, 20, 0, Math.PI, true);
            ctx.fill();

            ctx.restore();
        }

        // 모든 카드가 완벽히 개봉되고 난 최종 수속
        function endDrawSequence() {
            // 꽝, 당첨 집계 분석
            let wins = 0;
            results.forEach(r => { if (r === 'WIN') wins++; });
            
            document.getElementById('draw-status-text').innerHTML = 
                `추첨 종료: 전체 ${totalDraws}회 시행 중 <span class="text-yellow-400 font-extrabold">당첨 ${wins}회</span> / <span class="text-slate-400 font-extrabold">꽝 ${totalDraws - wins}회</span> 기록`;

            // 다시 시작 버튼 활성화 처리
            const btnBack = document.getElementById('btn-back');
            btnBack.disabled = false;
            btnBack.className = "px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-extrabold rounded-xl text-sm flex items-center gap-2 shadow-lg shadow-indigo-500/20 cursor-pointer transition-all duration-150";
        }
    </script>
