<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상호작용형 학생 추첨 시스템</title>
    <!-- Tailwind CSS 지원 및 아이콘 라이브러리 연동 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');

        body {
            font-family: 'Pretendard', sans-serif;
            background:
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.35), transparent 32%),
                radial-gradient(circle at 80% 10%, rgba(14, 165, 233, 0.22), transparent 28%),
                radial-gradient(circle at 50% 90%, rgba(168, 85, 247, 0.18), transparent 35%),
                linear-gradient(135deg, #070816 0%, #101426 45%, #080a13 100%);
            color: #ffffff;
        }

        /* 유리를 연상시키는 배경 패널 스타일 */
        .glass-panel {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.045));
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow:
                0 30px 90px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 overflow-x-hidden relative">

    <div class="pointer-events-none fixed inset-0 overflow-hidden">
        <div class="absolute -top-24 -left-24 w-72 h-72 bg-indigo-500/20 rounded-full blur-3xl"></div>
        <div class="absolute top-1/4 -right-24 w-80 h-80 bg-sky-400/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-28 left-1/3 w-96 h-96 bg-fuchsia-500/10 rounded-full blur-3xl"></div>
    </div>

    <!-- 메인 컨테이너 -->
    <div class="w-full max-w-4xl glass-panel rounded-[2rem] shadow-2xl p-6 md:p-8 relative z-10">

        <!-- 커스텀 알림 모달 -->
        <div id="custom-alert" class="hidden fixed inset-0 flex items-center justify-center z-50 px-4">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
            <div
                class="bg-slate-800 border border-red-500/30 rounded-2xl p-6 max-w-sm w-full relative z-10 text-center shadow-2xl transform scale-95 transition-transform duration-200">
                <div
                    class="w-16 h-16 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <h3 class="text-lg font-bold mb-2">오류가 발생했습니다</h3>
                <p id="alert-message" class="text-slate-300 text-sm mb-6"></p>
                <button onclick="closeAlert()"
                    class="w-full py-2.5 bg-red-500 hover:bg-red-600 active:scale-95 transition text-white font-semibold rounded-xl">확인</button>
            </div>
        </div>

        <!-- 1. 설정 및 입력 화면 -->
        <div id="setup-screen" class="space-y-6">
            <div class="text-center">
                <span
                    class="inline-flex items-center gap-2 px-3.5 py-1.5 bg-indigo-500/10 border border-indigo-400/20 text-indigo-200 rounded-full text-xs font-bold tracking-wider uppercase shadow-lg shadow-indigo-500/10">
                    <i class="fa-solid fa-clover text-emerald-300"></i>
                    LUCKY DRAW
                </span>
                <h1
                    class="text-4xl md:text-5xl font-black mt-3 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-sky-300 via-indigo-300 to-fuchsia-300 drop-shadow">
                    학생 추첨 시뮬레이터
                </h1>
                <p class="text-slate-400 text-sm mt-1">확률과 횟수를 지정하여 공정한 추첨을 시작하세요.</p>
            </div>

            <!-- 설정 카드 레이아웃 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4">

                <!-- 확률 입력 카드 -->
                <div
                    class="bg-white/[0.065] border border-white/10 rounded-3xl p-5 space-y-4 shadow-xl shadow-black/20 hover:bg-white/[0.085] transition">
                    <h2 class="text-lg font-bold flex items-center gap-2 text-indigo-300">
                        <i class="fa-solid fa-percentage"></i> 확률 방식 선택
                    </h2>

                    <!-- 토글 탭 -->
                    <div class="flex bg-black/30 p-1.5 rounded-2xl border border-white/5">
                        <button onclick="setProbType('fraction')" id="btn-fraction"
                            class="flex-1 py-2.5 rounded-xl text-sm font-bold transition active:scale-95 bg-gradient-to-r from-indigo-500 to-sky-500 text-white shadow-lg shadow-indigo-500/20">
                            분수 입력
                        </button>
                        <button onclick="setProbType('percent')" id="btn-percent"
                            class="flex-1 py-2.5 rounded-xl text-sm font-bold transition active:scale-95 text-slate-400 hover:text-white hover:bg-white/5">
                            퍼센트(%) 입력
                        </button>
                    </div>

                    <!-- 분수 입력 영역 -->
                    <div id="fraction-area" class="space-y-2">
                        <label class="block text-xs text-slate-400">당첨 확률 (분수 형태)</label>
                        <div
                            class="flex items-center justify-center gap-3 bg-black/20 p-3 rounded-xl border border-white/5">
                            <input type="number" id="prob-num" value="1" min="1"
                                class="w-20 bg-slate-950/70 text-center py-2.5 text-xl font-black rounded-xl border border-white/10 focus:outline-none focus:border-emerald-400 focus:ring-4 focus:ring-emerald-400/10 transition text-emerald-300 shadow-inner">
                            <span class="text-xl font-bold text-slate-500">/</span>
                            <input type="number" id="prob-den" value="5" min="1"
                                class="w-20 bg-slate-800 text-center py-2 text-lg font-bold rounded-lg border border-slate-700 focus:outline-none focus:border-indigo-500 transition text-indigo-400">
                        </div>
                        <p class="text-[11px] text-slate-400 text-center" id="fraction-preview">현재 확률: 20% (5번 중 1번 당첨)
                        </p>
                    </div>

                    <!-- 퍼센트 입력 영역 -->
                    <div id="percent-area" class="space-y-2 hidden">
                        <label class="block text-xs text-slate-400">당첨 확률 (퍼센트 수치)</label>
                        <div
                            class="flex items-center justify-center gap-2 bg-black/20 p-3 rounded-xl border border-white/5">
                            <input type="number" id="prob-percent" value="20" min="0" max="100" step="any"
                                class="w-28 bg-slate-950/70 text-center py-2.5 text-xl font-black rounded-xl border border-white/10 focus:outline-none focus:border-emerald-400 focus:ring-4 focus:ring-emerald-400/10 transition text-emerald-300 shadow-inner">
                            <span class="text-xl font-bold text-slate-400">%</span>
                        </div>
                        <p class="text-[11px] text-slate-400 text-center">0%에서 100% 사이로 자유롭게 설정 가능합니다.</p>
                    </div>
                </div>

                <!-- 추첨 횟수 입력 카드 -->
                <div
                    class="bg-white/[0.065] border border-white/10 rounded-3xl p-5 flex flex-col justify-between shadow-xl shadow-black/20 hover:bg-white/[0.085] transition">
                    <div class="space-y-4">
                        <h2 class="text-lg font-bold flex items-center gap-2 text-indigo-300">
                            <i class="fa-solid fa-ticket"></i> 추첨 횟수 설정
                        </h2>

                        <div class="space-y-2">
                            <label class="block text-xs text-slate-400">총 뽑아낼 카드 갯수 (최대 40회)</label>
                            <div
                                class="flex items-center justify-between bg-black/20 p-3 rounded-xl border border-white/5">
                                <button onclick="adjustDrawCount(-1)"
                                    class="w-10 h-10 bg-slate-800 hover:bg-slate-700 active:scale-90 transition rounded-lg text-lg font-bold flex items-center justify-center">
                                    <i class="fa-solid fa-minus"></i>
                                </button>
                                <input type="number" id="draw-count" value="5" min="1" max="40"
                                    class="w-20 bg-transparent text-center text-2xl font-black focus:outline-none text-white">
                                <button onclick="adjustDrawCount(1)"
                                    class="w-10 h-10 bg-slate-800 hover:bg-slate-700 active:scale-90 transition rounded-lg text-lg font-bold flex items-center justify-center">
                                    <i class="fa-solid fa-plus"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <button onclick="startDraw()"
                        class="group w-full mt-6 py-4 bg-gradient-to-r from-sky-500 via-indigo-500 to-fuchsia-500 hover:brightness-110 active:scale-[0.98] transition-all duration-200 rounded-2xl font-black text-lg shadow-xl shadow-indigo-500/30 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-play group-hover:scale-110 transition-transform"></i>
                        추첨 시작하기
                    </button>
                </div>
            </div>
        </div>

        <!-- 2. 추첨 결과 & 애니메이션 Canvas 화면 -->
        <div id="draw-screen" class="hidden space-y-6">
            <div
                class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4 border-b border-white/10 pb-4">
                <div class="space-y-1">
                    <div class="flex flex-wrap items-center gap-2.5">
                        <h2 class="text-xl md:text-2xl font-extrabold text-indigo-300 flex items-center gap-2">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> 실시간 추첨 현황
                        </h2>
                        <!-- 설정된 확률 표시 배지 -->
                        <span id="current-probability-badge"
                            class="px-2.5 py-0.5 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-lg text-xs font-bold tracking-wide">
                            설정 확률: -
                        </span>
                    </div>
                    <p class="text-xs text-slate-400" id="draw-status-text">추첨 준비 중...</p>
                </div>
                <!-- 돌아가기 버튼 -->
                <button id="btn-back" onclick="goBack()"
                    class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all text-white font-bold rounded-xl text-sm flex items-center gap-2 opacity-50 cursor-not-allowed"
                    disabled>
                    <i class="fa-solid fa-rotate-left"></i> 다시 설정하기 (설정 유지)
                </button>
            </div>

            <!-- Canvas 컨테이너 -->
            <div
                class="relative w-full aspect-[4/3] max-h-[500px] bg-slate-950/90 rounded-3xl overflow-hidden border border-white/10 shadow-2xl shadow-black/40 ring-1 ring-white/5">
                <canvas id="canvas" class="w-full h-full block"></canvas>
            </div>
        </div>
    </div>

    <!-- 스크립트 파트 -->
    <script>
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // 상태 변수들
        let probType = 'fraction'; // 'fraction' | 'percent'
        let probability = 0.2; // 계산된 확률 (0 ~ 1)
        let totalDraws = 5;
        let results = []; // 각 회차의 결과 ('WIN' | 'LOSE')

        // Canvas 관련
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let animationId;

        // 애니메이션 그래픽 데이터 구조
        let particles = [];
        let cards = [];

        // 단계 정의
        // 'COUNTDOWN': 3초 카운트다운 및 카드 고속 셔플링 -> 'REVEALING': 0.3초당 카드 한 장씩 공개 -> 'FINISHED': 완료
        let animState = 'COUNTDOWN';
        let countdownTimer = 0; // 프레임 단위 누적 (60fps 기준)
        const countdownDuration = 180; // 3초 (60fps = 180프레임)

        let revealTimer = 0;
        const revealInterval = 18; // 0.3초 (60fps = 18프레임)
        let currentRevealIndex = -1; // 현재 오픈 중인 카드 인덱스

        // 커스텀 알림창 핸들러
        function showAlert(msg) {
            document.getElementById('alert-message').innerText = msg;
            const modal = document.getElementById('custom-alert');
            modal.classList.remove('hidden');
        }
        function closeAlert() {
            document.getElementById('custom-alert').classList.add('hidden');
        }

        // 확률 모드 변경
        function setProbType(type) {
            probType = type;
            const btnFraction = document.getElementById('btn-fraction');
            const btnPercent = document.getElementById('btn-percent');
            const fractionArea = document.getElementById('fraction-area');
            const percentArea = document.getElementById('percent-area');

            if (type === 'fraction') {
                btnFraction.className = "flex-1 py-2.5 rounded-xl text-sm font-bold transition active:scale-95 bg-gradient-to-r from-indigo-500 to-sky-500 text-white shadow-lg shadow-indigo-500/20";
                btnPercent.className = "flex-1 py-2.5 rounded-xl text-sm font-bold transition active:scale-95 text-slate-400 hover:text-white hover:bg-white/5";
                fractionArea.classList.remove('hidden');
                percentArea.classList.add('hidden');
            } else {
                btnFraction.className = "flex-1 py-2.5 rounded-xl text-sm font-bold transition active:scale-95 text-slate-400 hover:text-white hover:bg-white/5";
                btnPercent.className = "flex-1 py-2.5 rounded-xl text-sm font-bold transition active:scale-95 bg-gradient-to-r from-indigo-500 to-sky-500 text-white shadow-lg shadow-indigo-500/20";
                fractionArea.classList.add('hidden');
                percentArea.classList.remove('hidden');
            }
        }

        // 실시간 분수 미리보기
        document.getElementById('prob-num').addEventListener('input', updateFractionPreview);
        document.getElementById('prob-den').addEventListener('input', updateFractionPreview);

        function updateFractionPreview() {
            const num = parseInt(document.getElementById('prob-num').value) || 0;
            const den = parseInt(document.getElementById('prob-den').value) || 1;
            const preview = document.getElementById('fraction-preview');
            if (den <= 0) {
                preview.innerText = "분모는 1 이상이어야 합니다.";
                return;
            }
            const pct = Math.min(100, Math.max(0, (num / den) * 100)).toFixed(1);
            preview.innerText = `현재 확률: ${pct}% (${den}번 중 ${num}번 당첨)`;
        }

        // 횟수 조절기
        function adjustDrawCount(val) {
            const input = document.getElementById('draw-count');
            let current = parseInt(input.value) || 1;
            current += val;
            if (current < 1) current = 1;
            if (current > 40) current = 40;
            input.value = current;
        }

        // --- 추첨 시작 ---
        function startDraw() {
            // 1. 데이터 검증 및 분석
            totalDraws = parseInt(document.getElementById('draw-count').value);
            if (isNaN(totalDraws) || totalDraws < 1 || totalDraws > 40) {
                showAlert('추첨 횟수는 1회부터 40회까지만 입력 가능합니다.');
                return;
            }

            let displayProbText = '';
            if (probType === 'fraction') {
                const num = parseInt(document.getElementById('prob-num').value);
                const den = parseInt(document.getElementById('prob-den').value);
                if (isNaN(num) || isNaN(den) || den <= 0 || num < 0) {
                    showAlert('올바른 분수 형태를 지정해 주세요 (예: 1 / 5)');
                    return;
                }
                if (num > den) {
                    showAlert('분자가 분모보다 클 수 없습니다. (100% 초과 불가)');
                    return;
                }
                probability = num / den;
                const pct = (probability * 100).toFixed(1);
                displayProbText = `설정 확률: ${num}/${den} (${pct}%)`;
            } else {
                const percent = parseFloat(document.getElementById('prob-percent').value);
                if (isNaN(percent) || percent < 0 || percent > 100) {
                    showAlert('퍼센트 값은 0%에서 100% 사이여야 합니다.');
                    return;
                }
                probability = percent / 100;
                displayProbText = `설정 확률: ${percent}%`;
            }

            // 실시간 상단 배지에 설정 확률 반영
            document.getElementById('current-probability-badge').innerText = displayProbText;

            // 2. 난수 독립 시행으로 미리 결과 연산
            results = [];
            for (let i = 0; i < totalDraws; i++) {
                results.push(Math.random() < probability ? 'WIN' : 'LOSE');
            }

            // 3. UI 화면 전환
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('draw-screen').classList.remove('hidden');

            // 돌아가기 버튼 초기화 비활성화
            const btnBack = document.getElementById('btn-back');
            btnBack.disabled = true;
            btnBack.className = "px-5 py-2.5 bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all text-white font-bold rounded-xl text-sm flex items-center gap-2 opacity-50 cursor-not-allowed";

            // 4. 시뮬레이터 시스템 초기화
            initSimulator();
        }

        // 돌아가기 기능 (세팅 유지)
        function goBack() {
            cancelAnimationFrame(animationId);
            document.getElementById('draw-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
        }

        // 고해상도 해상도 설정 헬퍼
        function resizeCanvas() {
            canvas.width = 800;
            canvas.height = 600;
        }

        class Card {
            constructor(index, result, x, y, w, h) {
                this.index = index;
                this.result = result;
                this.targetX = x;
                this.targetY = y;
                this.x = x;
                this.y = y + 100; // 아래에서 부드럽게 나타나는 오프셋
                this.w = w;
                this.h = h;

                this.flipProgress = 0; // 0: 뒷면, 1: 앞면
                this.isFlipped = false;
                this.opacity = 0;

                // 카운트다운 기간 동안 가짜로 깜빡일 상태 ('WIN' 또는 'LOSE')
                this.shuffleState = Math.random() < 0.5 ? 'WIN' : 'LOSE';
            }

            update() {
                // 부드러운 목적지 보간 (Ease-out)
                this.y += (this.targetY - this.y) * 0.12;
                if (this.opacity < 1) this.opacity += 0.08;

                // 카운트다운 기간 동안 무작위로 상태 고속 셔플
                if (animState === 'COUNTDOWN') {
                    if (Math.random() < 0.15) { // 약 15% 확률로 매 프레임마다 결과 반전
                        this.shuffleState = Math.random() < 0.5 ? 'WIN' : 'LOSE';
                    }
                }

                // 플립 회전 진척도 업데이트
                if (this.isFlipped && this.flipProgress < 1) {
                    this.flipProgress += 0.08;
                    if (this.flipProgress > 1) {
                        this.flipProgress = 1;
                        // 당첨 카드가 개봉되는 순간 금빛 폭죽 방출
                        if (this.result === 'WIN') {
                            spawnParticles(this.x + this.w / 2, this.y + this.h / 2);
                        }
                    }
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = Math.min(1, Math.max(0, this.opacity));

                const midX = this.x + this.w / 2;

                if (animState === 'COUNTDOWN') {
                    // --- 1. 카운트다운 고속 셔플링 연출 ---
                    const isWin = this.shuffleState === 'WIN';
                    const grad = ctx.createLinearGradient(this.x, this.y, this.x + this.w, this.y + this.h);

                    if (isWin) {
                        grad.addColorStop(0, '#1e1b4b');
                        grad.addColorStop(1, '#311042');
                        ctx.strokeStyle = 'rgba(234, 179, 8, 0.7)'; // 당첨 가능성 옐로우 광원
                    } else {
                        grad.addColorStop(0, '#0f172a');
                        grad.addColorStop(1, '#1e293b');
                        ctx.strokeStyle = 'rgba(99, 102, 241, 0.4)'; // 일반 블루 네온 광원
                    }

                    ctx.fillStyle = grad;
                    ctx.lineWidth = 2;
                    drawRoundRect(this.x, this.y, this.w, this.h, 12);
                    ctx.fill();
                    ctx.stroke();

                    // 흔들리며 무작위로 교차하는 글자 출력
                    ctx.fillStyle = isWin ? '#facc15' : '#6366f1';
                    ctx.font = '800 16px Pretendard';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(isWin ? '당첨' : '꽝', midX, this.y + this.h / 2);

                    // 디지털 스캔라인 빔 효과 연출
                    ctx.fillStyle = 'rgba(99, 102, 241, 0.08)';
                    const scanY = (Date.now() / 6) % this.h;
                    ctx.fillRect(this.x, this.y + scanY, this.w, 3);

                } else {
                    // --- 2. 카운트다운 후 뒷면 및 결과 차례대로 공개 연출 ---
                    const scaleX = Math.abs(Math.sin((this.flipProgress + 0.5) * Math.PI));

                    ctx.translate(midX, this.y + this.h / 2);
                    ctx.scale(scaleX, 1.0);
                    ctx.translate(-midX, -(this.y + this.h / 2));

                    const showFront = this.flipProgress >= 0.5;

                    if (!showFront) {
                        // 기본 뒷면 (미개봉 카드 디자인)
                        const grad = ctx.createLinearGradient(this.x, this.y, this.x + this.w, this.y + this.h);
                        grad.addColorStop(0, '#312e81');
                        grad.addColorStop(1, '#1e1b4b');
                        ctx.fillStyle = grad;
                        ctx.strokeStyle = 'rgba(99, 102, 241, 0.5)';
                        ctx.lineWidth = 2;

                        drawRoundRect(this.x, this.y, this.w, this.h, 12);
                        ctx.fill();
                        ctx.stroke();

                        // 카드 순번 인덱스 서클
                        ctx.fillStyle = 'rgba(255,255,255,0.1)';
                        ctx.beginPath();
                        ctx.arc(midX, this.y + this.h / 2 - 10, 20, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = '#a5b4fc';
                        ctx.font = '800 16px Pretendard';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(`${this.index + 1}`, midX, this.y + this.h / 2 - 10);

                        ctx.fillStyle = '#6366f1';
                        ctx.font = '600 11px Pretendard';
                        ctx.fillText('추첨중', midX, this.y + this.h / 2 + 22);

                    } else {
                        // 결과 앞면 카드 디자인
                        const isWin = this.result === 'WIN';
                        const grad = ctx.createLinearGradient(this.x, this.y, this.x + this.w, this.y + this.h);

                        if (isWin) {
                            grad.addColorStop(0, '#fef08a');
                            grad.addColorStop(1, '#eab308');
                            ctx.strokeStyle = '#facc15';
                        } else {
                            grad.addColorStop(0, '#475569');
                            grad.addColorStop(1, '#334155');
                            ctx.strokeStyle = '#64748b';
                        }

                        ctx.fillStyle = grad;
                        ctx.lineWidth = 3;
                        drawRoundRect(this.x, this.y, this.w, this.h, 12);
                        ctx.fill();
                        ctx.stroke();

                        ctx.fillStyle = isWin ? '#713f12' : '#f8fafc';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';

                        ctx.font = isWin ? '30px Pretendard' : '22px Pretendard';
                        ctx.fillText(isWin ? '🎉' : '💀', midX, this.y + this.h / 2 - 18);

                        ctx.font = '800 16px Pretendard';
                        ctx.fillText(isWin ? '당첨 !' : '꽝', midX, this.y + this.h / 2 + 15);

                        ctx.fillStyle = isWin ? '#a16207' : '#94a3b8';
                        ctx.font = 'bold 11px Pretendard';
                        ctx.fillText(`${this.index + 1}회차`, midX, this.y + this.h / 2 + 36);
                    }
                }

                ctx.restore();
            }
        }

        // 당첨 축하 꽃가루 파티클 클래스
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 6 + 4;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 3;
                this.gravity = 0.25;
                this.opacity = 1;
                this.color = `hsl(${Math.random() * 40 + 35}, 100%, 60%)`;
                this.rotation = Math.random() * Math.PI;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
                this.opacity -= 0.02;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.opacity);
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        // 둥근 사각형 유틸리티 함수
        function drawRoundRect(x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        function spawnParticles(x, y) {
            for (let i = 0; i < 25; i++) {
                particles.push(new Particle(x, y));
            }
        }

        // --- 추첨 시뮬레이터 초기화 및 구동 ---
        function initSimulator() {
            resizeCanvas();

            particles = [];
            cards = [];
            countdownTimer = 0;
            revealTimer = 0;
            currentRevealIndex = -1;
            animState = 'COUNTDOWN';

            // 중앙 정렬된 카드 레이아웃 배치 좌표 연산
            calculateGrid();

            // 루프 제어권 갱신 및 활성화
            if (animationId) cancelAnimationFrame(animationId);
            animate();
        }

        // 카드 수량별 그리드 동적 계산기
        function calculateGrid() {
            const count = totalDraws;
            const startY = 280;  // 물리적 추첨 공간 제외 후 더 여유로워진 가변 한계 영역 시작선
            const endY = 560;
            const areaWidth = 760;

            let cols = 1;
            let rows = 1;
            let maxArea = 0;

            for (let r = 1; r <= 4; r++) {
                let c = Math.ceil(count / r);
                if (c > 12) continue;

                const tempW = (areaWidth - (c - 1) * 8) / c;
                const tempH = ((endY - startY) - (r - 1) * 8) / r;

                const size = Math.min(tempW, tempH * 0.9);
                if (size > maxArea) {
                    maxArea = size;
                    cols = c;
                    rows = r;
                }
            }

            let cardW = Math.min(95, (areaWidth - (cols - 1) * 8) / cols);
            let cardH = Math.min(120, cardW * 1.25);

            const totalGridW = cols * cardW + (cols - 1) * 8;
            const totalGridH = rows * cardH + (rows - 1) * 8;
            const startX = 20 + (areaWidth - totalGridW) / 2;
            const originY = startY + ((endY - startY) - totalGridH) / 2;

            for (let i = 0; i < count; i++) {
                const rIndex = Math.floor(i / cols);
                const cIndex = i % cols;
                const cx = startX + cIndex * (cardW + 8);
                const cy = originY + rIndex * (cardH + 8);
                cards.push(new Card(i, results[i], cx, cy, cardW, cardH));
            }
        }

        // --- 메인 드로잉 루프 ---
        function animate() {
            // 배경 페인팅
            const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            bg.addColorStop(0, '#111827');
            bg.addColorStop(0.45, '#090916');
            bg.addColorStop(1, '#020617');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.globalAlpha = 0.12;
            ctx.strokeStyle = '#6366f1';

            for (let x = 0; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            for (let y = 0; y < canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            ctx.restore();

            // 1. 카운트다운 타이머 디스플레이 렌더링
            if (animState === 'COUNTDOWN') {
                countdownTimer++;

                let secondsLeft = 3 - Math.floor(countdownTimer / 60);
                if (secondsLeft < 1) secondsLeft = 1;

                document.getElementById('draw-status-text').innerText = `추첨 개시까지 ${secondsLeft}초...`;

                // 네온 카운트다운 링 드로잉
                drawCountdownHUD(secondsLeft);

                if (countdownTimer >= countdownDuration) {
                    animState = 'REVEALING';
                    currentRevealIndex = 0;
                    revealTimer = 0;
                    document.getElementById('draw-status-text').innerText = '카운트다운 종료! 순차 개봉을 시작합니다.';
                }
            }

            // 2. 카드 일괄 상태 업데이트 및 렌더링
            cards.forEach(card => {
                card.update();
                card.draw();
            });

            // 3. 폭죽 꽃가루 파티클 처리
            particles.forEach((p, idx) => {
                p.update();
                p.draw();
                if (p.opacity <= 0) particles.splice(idx, 1);
            });

            // 4. 개별 순차 개봉 진행 전이
            if (animState === 'REVEALING') {
                revealTimer++;
                if (currentRevealIndex < cards.length) {
                    const currentCard = cards[currentRevealIndex];
                    if (!currentCard.isFlipped) {
                        currentCard.isFlipped = true;
                    }

                    if (revealTimer >= revealInterval) {
                        revealTimer = 0;
                        currentRevealIndex++;
                    }
                } else {
                    animState = 'FINISHED';
                    endDrawSequence();
                }
            }

            animationId = requestAnimationFrame(animate);
        }

        // 상단 네온 카운트다운 그래픽 렌더러
        function drawCountdownHUD(secondsLeft) {
            const pulseProgress = (countdownTimer % 60) / 60;
            const pulseScale = 1.0 + Math.sin(pulseProgress * Math.PI) * 0.08; // 자연스러운 수축 팽창 모션

            ctx.save();
            ctx.translate(400, 140);
            ctx.scale(pulseScale, pulseScale);

            // 네온 아웃글로우 이펙트 원
            ctx.shadowColor = 'rgba(99, 102, 241, 0.6)';
            ctx.shadowBlur = 24;
            ctx.strokeStyle = '#6366f1';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.arc(0, 0, 64, 0, Math.PI * 2);
            ctx.stroke();

            // 내부 불투명 원형 코어
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(15, 23, 42, 0.85)';
            ctx.beginPath();
            ctx.arc(0, 0, 58, 0, Math.PI * 2);
            ctx.fill();

            // 숫자 텍스트 표시
            ctx.fillStyle = '#ffffff';
            ctx.font = '900 64px Pretendard';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(secondsLeft, 0, -2);

            ctx.restore();
        }

        // 추첨 최종 귀결 수속
        function endDrawSequence() {
            let wins = 0;
            results.forEach(r => { if (r === 'WIN') wins++; });

            document.getElementById('draw-status-text').innerHTML =
                `추첨 완료 - 전체 ${totalDraws}회 중 <span class="text-yellow-300 font-black">당첨 ${wins}회</span>, <span class="text-slate-300 font-black">꽝 ${totalDraws - wins}회</span>`;

            // 설정 복귀 버튼 활성화
            const btnBack = document.getElementById('btn-back');
            btnBack.disabled = false;
            btnBack.className = "px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-extrabold rounded-xl text-sm flex items-center gap-2 shadow-lg shadow-indigo-500/20 cursor-pointer transition-all duration-150";
        }
    </script>
